<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rainy Day</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #0e1218;
    width: 100vw; height: 100vh;
  }
  canvas#rain { display: block; width: 100vw; height: 100vh; }
  /* Background canvas is offscreen — only ever rendered through
     raindrop-fx's refraction pass, never directly. */
  canvas#bg { display: none; }
</style>
</head>
<body>
  <canvas id="rain"></canvas>
  <canvas id="bg" width="1920" height="1080"></canvas>
  <div id="emptyState" style="
       display: none; position: fixed; inset: 0;
       align-items: center; justify-content: center;
       color: #c8d0d8; font: 16px -apple-system, BlinkMacSystemFont, sans-serif;
       background: linear-gradient(180deg, #16202d 0%, #0e1218 100%);
       text-align: center; padding: 40px;">
    <div>
      <div style="font-size: 18px; margin-bottom: 16px; color: #ffffff;">No background images found</div>
      <div style="opacity: 0.75; line-height: 1.6;">
        Drop JPG, PNG, or HEIC files into:<br>
        <code style="opacity: 0.9;">~/Library/Application&nbsp;Support/Rainy&nbsp;Day/Backgrounds/</code><br>
        and the saver will pick them up next time it activates.
      </div>
    </div>
  </div>
  <script>
    // Force preserveDrawingBuffer:true on every WebGL context the page
    // creates. Without this flag the backbuffer is cleared after each
    // frame and canvas.toDataURL() returns blank pixels — the
    // screenshot feature depends on toDataURL returning the actual
    // rendered rain. Done before the bundle loads so raindrop-fx's
    // first context call picks up the override.
    (() => {
      const orig = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function(type, options) {
        if (type === 'webgl' || type === 'webgl2') {
          options = Object.assign({}, options || {}, { preserveDrawingBuffer: true });
        }
        return orig.call(this, type, options);
      };
    })();
  </script>
  <script src="raindrop-fx.bundle.js"></script>
  <script>
    'use strict';

    // ── Configuration ──────────────────────────────────────────────────────
    //
    // Native side injects window.RAINY_DAY_CONFIG via WKUserScript at
    // documentStart with two fields:
    //   cycleMs:     scene rotation interval in milliseconds
    //   backgrounds: array of file:// URLs to image files in
    //                ~/Library/Application Support/Rainy Day/Backgrounds/
    //
    // The native side scans the folder fresh each activation, so the
    // list always reflects what's actually on disk — files renamed or
    // removed by the user are picked up automatically. We never
    // hardcode filenames here: any fallback list would lie about what
    // exists.
    const CONFIG = window.RAINY_DAY_CONFIG;
    const ROTATE_MS = (CONFIG && CONFIG.cycleMs) || (5 * 60 * 1000);
    const TRANSITION_MS = 3000;
    const sceneSources = (CONFIG && CONFIG.backgrounds) || [];

    // No backgrounds available — show the empty-state notice and bail
    // out. raindrop-fx needs a background texture to refract; with no
    // images there's nothing meaningful to render.
    if (sceneSources.length === 0) {
      document.getElementById('rain').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      throw new Error('No backgrounds configured — see emptyState notice');
    }

    const bg = document.getElementById('bg');
    const bctx = bg.getContext('2d');

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    // Paint `img` into `ctx` with object-fit: cover semantics — fill the
    // whole canvas, crop excess. Without this, source images of varying
    // aspect ratios would leave bars or distort.
    function paintImageCover(ctx, img) {
      const cw = ctx.canvas.width, ch = ctx.canvas.height;
      const ir = img.width / img.height;
      const cr = cw / ch;
      let sx, sy, sw, sh;
      if (ir > cr) {
        sh = img.height;
        sw = sh * cr;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / cr;
        sx = 0;
        sy = (img.height - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
    }

    // ── Boot sequence ──────────────────────────────────────────────────────
    //
    // Load every image up front so transitions never block on a network
    // fetch (the saver runs offline anyway — files are bundled — but
    // image decoding is still async). Then init raindrop-fx with the
    // first scene already painted.
    let fx = null;
    let scenes = [];
    let sceneIdx = 0;

    console.log('Loading ' + sceneSources.length + ' background images…');
    Promise.all(sceneSources.map(loadImage)).then(loaded => {
      console.log('All ' + loaded.length + ' images loaded; first: ' + loaded[0].naturalWidth + 'x' + loaded[0].naturalHeight);
      scenes = loaded;
      paintImageCover(bctx, scenes[0]);

      // Tuning notes (bigger drops, faster spawn, denser mist) carried
      // forward from the original procedural-background config.
      fx = new RaindropFX({
        canvas: document.getElementById('rain'),
        background: bg,
        spawnSize: [90, 160],
        spawnInterval: [0.04, 0.06],
        dropletsPerSeconds: 800,
      });
      fx.start();

      // raindrop-fx loads its WebGL assets asynchronously inside fx.start().
      // Calling fx.resize() before reloadBackground() resolves throws
      // `null is not an object (evaluating 'this.originalBackground.size')`
      // at Utils.imageResize. Poll for renderer.originalBackground to
      // appear, then do the first resize.
      function waitForFxReady() {
        if (fx.renderer && fx.renderer.originalBackground) {
          resize();
          startRotation();
        } else {
          setTimeout(waitForFxReady, 50);
        }
      }
      waitForFxReady();
    }).catch(err => {
      console.error('Image load failed:', err);
    });

    // ── Smooth scene transition (fade through dim) ─────────────────────────
    //
    // bg only ever contains ONE complete scene at a time (plus a black
    // overlay at varying alpha during the transition). Underlying scene
    // swaps at the midpoint, where the black overlay is at peak alpha
    // and the actual scene contents are hidden under it. Same approach
    // we used for procedural scenes — works equally well for photos.
    let transitioning = false;
    function transitionTo(nextIdx) {
      if (transitioning || !fx) return;
      transitioning = true;
      const fromIdx = sceneIdx;
      const start = performance.now();
      let swapped = false;

      function frame(now) {
        const t = Math.min(1, (now - start) / TRANSITION_MS);
        if (!swapped && t >= 0.5) {
          swapped = true;
          sceneIdx = nextIdx;
        }
        const idxNow = swapped ? nextIdx : fromIdx;
        paintImageCover(bctx, scenes[idxNow]);
        bctx.fillStyle = `rgba(0, 0, 0, ${Math.sin(t * Math.PI)})`;
        bctx.fillRect(0, 0, bg.width, bg.height);
        if (typeof fx.setBackground === 'function') {
          fx.setBackground(bg);
        }
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          transitioning = false;
        }
      }
      requestAnimationFrame(frame);
    }

    function startRotation() {
      setInterval(() => {
        const next = (sceneIdx + 1) % scenes.length;
        transitionTo(next);
      }, ROTATE_MS);
    }

    // ── Resize handling ────────────────────────────────────────────────────
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const rain = document.getElementById('rain');
      rain.width = Math.floor(window.innerWidth * dpr);
      rain.height = Math.floor(window.innerHeight * dpr);
      if (fx
          && typeof fx.resize === 'function'
          && fx.renderer
          && fx.renderer.originalBackground) {
        fx.resize(rain.width, rain.height);
      }
    }
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
